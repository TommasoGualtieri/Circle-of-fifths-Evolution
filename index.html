<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonic Master & AI Composer</title>
    <style>
        :root {
            --primary-green: #66bb6a; --dark-gray: #333; --accent-gold: #ffca28;
            --bg-light: #f4f7f6; --card-bg: #ffffff; --text-color: #333; --border-color: #eeeeee;
        }
        body.dark-mode {
            --bg-light: #121212; --card-bg: #1e1e1e; --text-color: #e0e0e0;
            --border-color: #333; --dark-gray: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-light); margin: 0; padding: 20px; color: var(--text-color); transition: 0.3s; }
        .header-bar { max-width: 1400px; margin: 0 auto 20px; display: flex; justify-content: space-between; align-items: center; }
        .dashboard { display: flex; max-width: 1400px; margin: 0 auto; gap: 20px; align-items: flex-start; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .side-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); }
        .sig-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border-color); font-size: 0.85em; cursor: pointer; }
        .sig-row.active { color: var(--primary-green); font-weight: bold; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; }
        .circle-wrapper { position: relative; width: 440px; height: 440px; background: var(--card-bg); border-radius: 50%; margin-bottom: 25px; border: 1px solid var(--border-color); }
        .note-btn { position: absolute; width: 70px; height: 70px; margin: -35px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; background: var(--primary-green); color: white; border: 4px solid var(--card-bg); }
        .note-btn.active { background: #444; transform: scale(1.1); }
        .degree-marker { position: absolute; width: 22px; height: 22px; background: var(--accent-gold); border-radius: 50%; font-size: 9px; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; z-index: 10; transition: 0.5s; border: 2px solid white; }
        .info-card { width: 100%; background: var(--card-bg); border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border-color); overflow: hidden; }
        .card-header { background: rgba(0,0,0,0.03); padding: 10px 20px; font-weight: bold; font-size: 0.85em; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 5px; text-align: center; border-top: 1px solid var(--border-color); width: 14.2%; cursor: pointer; vertical-align: top; }
        td:hover { background: rgba(102, 187, 106, 0.05); }
        .chord-name { font-weight: bold; display: block; }
        .chord-notes { font-size: 0.65em; color: var(--accent-gold); font-family: monospace; display: block; margin-top: 4px; }
        .builder-card { width: 100%; background: var(--card-bg); border-radius: 12px; padding: 20px; border: 2px dashed var(--border-color); box-sizing: border-box; }
        .prog-display { display: flex; gap: 10px; min-height: 60px; align-items: center; flex-wrap: wrap; margin: 15px 0; }
        .prog-chord { background: var(--primary-green); color: white; padding: 8px 15px; border-radius: 6px; font-weight: bold; position: relative; }
        .suggestions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .sug-btn { font-size: 0.7em; padding: 5px 10px; border-radius: 4px; border: 1px solid var(--primary-green); background: none; color: var(--primary-green); cursor: pointer; transition: 0.2s; }
        .sug-btn:hover { background: var(--primary-green); color: white; }
    </style>
</head>
<body>

<div class="header-bar">
    <h2>Harmonic Dashboard Evolution</h2>
    <button onclick="document.body.classList.toggle('dark-mode')" style="cursor:pointer; border-radius:20px; padding:5px 15px;">🌓 Dark Mode</button>
</div>

<div class="dashboard">
    <div class="sidebar">
        <div class="side-card">
            <h3>Alterazioni</h3>
            <div id="sig-list"></div>
        </div>
        <div class="side-card" style="font-size: 0.75em;">
            <h3>Memo Gradi</h3>
            <p>I: Maj7 (1-3-5-7)<br>ii: m7 (1-b3-5-b7)<br>V: 7 (1-3-5-b7)</p>
        </div>
    </div>

    <div class="main-content">
        <div class="circle-wrapper" id="circle">
            <div id="deg-0" class="degree-marker">I</div><div id="deg-1" class="degree-marker">ii</div>
            <div id="deg-2" class="degree-marker">iii</div><div id="deg-3" class="degree-marker">IV</div>
            <div id="deg-4" class="degree-marker">V</div><div id="deg-5" class="degree-marker">vi</div>
            <div id="deg-6" class="degree-marker">vii°</div>
        </div>

        <div class="info-card">
            <div class="card-header" id="maj-label">Maggiore</div>
            <table><tr id="maj-tri"></tr><tr id="maj-quad" style="color:var(--accent-gold)"></tr></table>
        </div>

        <div class="info-card">
            <div class="card-header" id="min-label">Minore</div>
            <table><tr id="min-tri"></tr><tr id="min-quad" style="color:var(--accent-gold)"></tr></table>
        </div>

        <div class="builder-card">
            <strong>Progression Builder</strong>
            <div class="prog-display" id="prog-display"></div>
            <div id="sug-container">
                <small style="color:#888">Suggerimenti basati sull'ultimo accordo:</small>
                <div class="suggestions" id="suggestions"></div>
            </div>
            <button onclick="clearProg()" style="margin-top:10px; font-size:0.7em;">Clear</button>
        </div>
    </div>
</div>

<script>
    const data = [
        { maj: "C", min: "Am", notes: ["C","D","E","F","G","A","B"], alts: "Nessuna" },
        { maj: "G", min: "Em", notes: ["G","A","B","C","D","E","F♯"], alts: "F♯" },
        { maj: "D", min: "Bm", notes: ["D","E","F♯","G","A","B","C♯"], alts: "F♯, C♯" },
        { maj: "A", min: "F♯m", notes: ["A","B","C♯","D","E","F♯","G♯"], alts: "F♯, C♯, G♯" },
        { maj: "E", min: "C♯m", notes: ["E","F♯","G♯","A","B","C♯","D♯"], alts: "F♯, C♯, G♯, D♯" },
        { maj: "B", min: "G♯m", notes: ["B","C♯","D♯","E","F♯","G♯","A♯"], alts: "F♯, C♯, G♯, D♯, A♯" },
        { maj: "G♭", min: "E♭m", notes: ["G♭","A♭","B♭","C♭","D♭","E♭","F"], alts: "B♭, E♭, A♭, D♭, G♭, C♭" },
        { maj: "D♭", min: "B♭m", notes: ["D♭","E♭","F","G♭","A♭","B♭","C"], alts: "B♭, E♭, A♭, D♭, G♭" },
        { maj: "A♭", min: "Fm", notes: ["A♭","B♭","C","D♭","E♭","F","G"], alts: "B♭, E♭, A♭, D♭" },
        { maj: "E♭", min: "Cm", notes: ["E♭","F","G","A♭","B♭","C","D"], alts: "B♭, E♭, A♭" },
        { maj: "B♭", min: "Gm", notes: ["B♭","C","D","E♭","F","G","A"], alts: "B♭, E♭" },
        { maj: "F", min: "Dm", notes: ["F","G","A","B♭","C","D","E"], alts: "B♭" }
    ];

    let currentScaleNotes = [];
    let currentKeyIdx = 0;

    // Helper per trovare le note di un accordo (triadi e quadriadi)
    function getChordSpelling(scale, rootIdx, type) {
        const len = scale.length;
        const root = scale[rootIdx];
        const third = scale[(rootIdx + 2) % len];
        const fifth = scale[(rootIdx + 4) % len];
        if(type === 'triad') return `${root}-${third}-${fifth}`;
        const seventh = scale[(rootIdx + 6) % len];
        return `${root}-${third}-${fifth}-${seventh}`;
    }

    function init() {
        data.forEach((item, i) => {
            const angle = (i * 30 - 90) * (Math.PI / 180);
            const x = 220 + 170 * Math.cos(angle);
            const y = 220 + 170 * Math.sin(angle);
            const btn = document.createElement('div');
            btn.className = 'note-btn'; btn.style.left = x+'px'; btn.style.top = y+'px';
            btn.innerHTML = `<b>${item.maj}</b><small>${item.min}</small>`;
            btn.onclick = () => update(i); btn.id = 'btn-'+i;
            document.getElementById('circle').appendChild(btn);

            const row = document.createElement('div');
            row.className = 'sig-row'; row.id = 'sig-'+i;
            row.innerHTML = `<span>${item.maj}</span><span style="color:var(--accent-gold)">${item.alts}</span>`;
            row.onclick = () => update(i);
            document.getElementById('sig-list').appendChild(row);
        });
        update(0);
    }

    function update(idx) {
        currentKeyIdx = idx;
        const s = data[idx];
        currentScaleNotes = s.notes;
        document.querySelectorAll('.note-btn, .sig-row').forEach(el => el.classList.remove('active'));
        document.getElementById('btn-'+idx).classList.add('active');
        document.getElementById('sig-'+idx).classList.add('active');

        // Sposta Markers
        [0, 2, 4, -1, 1, 3, 5].forEach((offset, i) => {
            const pos = (idx + offset + 12) % 12;
            const angle = (pos * 30 - 90) * (Math.PI / 180);
            const dot = document.getElementById('deg-'+i);
            dot.style.left = (220 + 120 * Math.cos(angle) - 11) + 'px';
            dot.style.top = (220 + 120 * Math.sin(angle) - 11) + 'px';
        });

        // Popola Tabelle
        const mT = ["", "m", "m", "", "", "m", "°"];
        const mQ = ["maj7", "m7", "m7", "maj7", "7", "m7", "m7♭5"];
        document.getElementById('maj-tri').innerHTML = s.notes.map((n, i) => 
            `<td onclick="addCh('${n}${mT[i]}', ${i})"><span class="chord-name">${n}${mT[i]}</span><span class="chord-notes">${getChordSpelling(s.notes, i, 'triad')}</span></td>`).join('');
        document.getElementById('maj-quad').innerHTML = s.notes.map((n, i) => 
            `<td onclick="addCh('${n}${mQ[i]}', ${i})"><span class="chord-name">${n}${mQ[i]}</span><span class="chord-notes">${getChordSpelling(s.notes, i, 'quad')}</span></td>`).join('');

        const minN = [...s.notes.slice(5), ...s.notes.slice(0, 5)];
        const minT = ["m", "°", "", "m", "m", "", ""];
        const minQ = ["m7", "m7♭5", "maj7", "m7", "m7", "maj7", "7"];
        document.getElementById('min-tri').innerHTML = minN.map((n, i) => 
            `<td onclick="addCh('${n}${minT[i]}', ${(i+5)%7})"><span class="chord-name">${n}${minT[i]}</span><span class="chord-notes">${getChordSpelling(minN, i, 'triad')}</span></td>`).join('');
        document.getElementById('min-quad').innerHTML = minN.map((n, i) => 
            `<td onclick="addCh('${n}${minQ[i]}', ${(i+5)%7})"><span class="chord-name">${n}${minQ[i]}</span><span class="chord-notes">${getChordSpelling(minN, i, 'quad')}</span></td>`).join('');
    }

    // LOGICA SUGGERIMENTI
    const progressions = {
        0: [3, 4, 5, 1], // Da I suggerisci IV, V, vi, ii
        1: [4, 0, 6],    // Da ii suggerisci V, I, vii°
        2: [5, 3],       // Da iii suggerisci vi, IV
        3: [4, 0, 1],    // Da IV suggerisci V, I, ii
        4: [0, 5, 3],    // Da V suggerisci I, vi, IV
        5: [1, 3, 4],    // Da vi suggerisci ii, IV, V
        6: [0, 5]        // Da vii° suggerisci I, vi
    };

    function addCh(name, degreeIdx) {
        const div = document.createElement('div');
        div.className = 'prog-chord'; div.innerText = name;
        document.getElementById('prog-display').appendChild(div);
        showSug(degreeIdx);
    }

    function showSug(lastDeg) {
        const container = document.getElementById('suggestions');
        container.innerHTML = '';
        const nextDegs = progressions[lastDeg] || [];
        nextDegs.forEach(d => {
            const btn = document.createElement('button');
            btn.className = 'sug-btn';
            const name = currentScaleNotes[d] + (["", "m", "m", "", "", "m", "°"][d]);
            btn.innerText = `Vai a ${name}`;
            btn.onclick = () => addCh(name, d);
            container.appendChild(btn);
        });
    }

    function clearProg() { document.getElementById('prog-display').innerHTML = ''; document.getElementById('suggestions').innerHTML = ''; }

    init();
</script>
</body>
</html>
